<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | TDQC Project</title>
    <style>
        :root {
            --primary-dark: #1a2a3a; /* Midnight Blue */
            --accent-blue: #3498db;  /* Science Blue */
            --bg-light: #f4f7f6;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .accent-bar {
            width: 60px;
            height: 4px;
            background-color: var(--accent-blue);
            margin: 20px auto;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ' .'; }
            40% { content: ' . .'; }
            60% { content: ' . . .'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <div class="accent-bar"></div>
        <p>
            <strong>Temporal Difference Calibration in Sequential Tasks</strong><br>
            Application to Vision-Language-Action Models
        </p>
        <p style="margin-top: 30px; font-size: 0.9rem;" class="loading-dots">
            Preparing project page
        </p>
    </div>

</body>
</html>
